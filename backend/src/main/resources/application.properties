# ================== Server ==================
server.port=8080

# ================== Spring 应用 ==================
spring.application.name=company-frame

# ================== 数据源（Druid） ==================
spring.datasource.type=com.alibaba.druid.pool.DruidDataSource
spring.datasource.druid.driver-class-name=com.mysql.jdbc.Driver
spring.datasource.druid.url=jdbc:mysql://39.105.1.143:3306/feng_company_frame?useUnicode=true&characterEncoding=utf-8&useSSL=false
spring.datasource.druid.username=root
spring.datasource.druid.password=bjtu_insis_2020+-w

# 连接池建立时创建的初始化连接数
spring.datasource.druid.initial-size=5
# 连接池中最大的活跃连接数
spring.datasource.druid.max-active=20
# 连接池中最小的活跃连接数
spring.datasource.druid.min-idle=5
# 获取连接最大等待时间（毫秒）
spring.datasource.druid.max-wait=5
# 打开 PSCache
spring.datasource.druid.pool-prepared-statements=true
# 每个连接上 PSCache 的大小
spring.datasource.druid.max-pool-prepared-statement-per-connection-size=20
# 校验 SQL
spring.datasource.druid.validation-query=SELECT 1 FROM DUAL
# 校验超时时间
spring.datasource.druid.validation-query-timeout=30000
# 获取连接时是否校验
spring.datasource.druid.test-on-borrow=false
# 归还连接时是否校验
spring.datasource.druid.test-on-return=false
# 空闲时是否校验
spring.datasource.druid.test-while-idle=true
# 多久检测一次空闲连接（毫秒）
spring.datasource.druid.time-between-eviction-runs-millis=60000
# 连接最小生存时间（毫秒）
spring.datasource.druid.min-evictable-idle-time-millis=300000
# 监控统计拦截（stat）+ 防火墙（wall）
spring.datasource.druid.filters=stat,wall

# ================== Redis ==================
# Redis服务器地址
spring.redis.host=47.97.229.171
# Redis端口
spring.redis.port=6380
# Redis密码
spring.redis.password=Cvicse@2025

# Lettuce连接池配置
# 最大连接数（负数表示不限制）
spring.redis.lettuce.pool.max-active=1024
# 最大阻塞等待时间（10秒）
spring.redis.lettuce.pool.max-wait=PT10S
# 最大空闲连接
spring.redis.lettuce.pool.max-idle=200
# 最小空闲连接
spring.redis.lettuce.pool.min-idle=0
# 关闭超时时间
spring.redis.lettuce.shutdown-timeout=PT10S

# ================== Thymeleaf ==================
# 模板前缀
spring.thymeleaf.prefix=classpath:/templates/
# 模板后缀
spring.thymeleaf.suffix=.html
# 编码
spring.thymeleaf.charset=UTF-8
# Content-Type
spring.thymeleaf.servlet.content-type=text/html
# 是否缓存（开发建议关闭）
spring.thymeleaf.cache=false

# ================== MyBatis ==================
# 实体别名包（多个用逗号分隔）
mybatis.type-aliases-package=com.feng.companyframe.bean,com.feng.companyframe.vo
# mapper.xml路径
mybatis.mapper-locations=classpath:mapper/*.xml

# ================== 日志 ==================
# 日志目录
logging.path=logs
# 日志文件
logging.file=${logging.path}/${spring.application.name}.log
# 指定包日志级别
logging.level.com.feng.companyframe=debug

# ================== Swagger ==================
swagger2.enable=true

# ================== JWT ==================
# 秘钥
jwt.secretKey=fengfanli
# accessToken 过期时间（2小时）
jwt.accessTokenExpireTime=PT2H
# refreshToken 过期时间（8小时）
jwt.refreshTokenExpireTime=PT8H
# App refreshToken 过期时间（30天）
jwt.refreshTokenExpireAppTime=P30D
# 签发者
jwt.issuer=fengfanli.com

# ================== PageHelper ==================
# 数据库方言
pagehelper.helper-dialect=mysql
# 分页合理化（true：自动修正页码）
pagehelper.reasonable=true